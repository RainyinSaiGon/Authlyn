server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: authlyn

  datasource:
    url: ${AUTHLYN_DB_URL}
    username: ${AUTHLYN_DB_USERNAME}
    password: ${AUTHLYN_DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${AUTHLYN_REDIS_HOST:localhost}
      port: ${AUTHLYN_REDIS_PORT:6379}
      password: ${AUTHLYN_REDIS_PASSWORD:}
      timeout: 3s

  mail:
    host: ${AUTHLYN_MAIL_HOST:localhost}
    port: ${AUTHLYN_MAIL_PORT:1025}
    username: ${AUTHLYN_MAIL_USERNAME:}
    password: ${AUTHLYN_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${AUTHLYN_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${AUTHLYN_MAIL_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

authlyn:
  jwt:
    issuer: ${AUTHLYN_JWT_ISSUER:http://localhost:8080}
    jwks-path: ${AUTHLYN_JWT_JWKS_PATH:/.well-known/jwks.json}
    kid: ${AUTHLYN_JWT_KID:authlyn-rsa-1}
    access-token-minutes: ${AUTHLYN_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${AUTHLYN_REFRESH_TOKEN_DAYS:30}
    private-key-path: ${AUTHLYN_JWT_PRIVATE_KEY_PATH:}
    public-key-path: ${AUTHLYN_JWT_PUBLIC_KEY_PATH:}
    private-key: ${AUTHLYN_JWT_PRIVATE_KEY:}
    public-key: ${AUTHLYN_JWT_PUBLIC_KEY:}
  security:
    bcrypt-strength: ${AUTHLYN_BCRYPT_STRENGTH:12}
    trusted-proxy-cidrs: ${AUTHLYN_TRUSTED_PROXY_CIDRS:}
  feature-flags:
    source: ${AUTHLYN_FEATURE_FLAG_SOURCE:local}
  web:
    allowed-origins: ${AUTHLYN_ALLOWED_ORIGINS:http://localhost:5173}
